# Don't print a new line at the start of the prompt
add_newline = false

# Make prompt a single line instead of two lines
[line_break]
disabled = true

# Replace the "вқҜ" symbol in the prompt with "вһң"
# [character]                         # The name of the module we are configuring is "character"
# success_symbol = "[вһң](bold green)"  # The "success_symbol" is set to "вһң" with color "bold green"

# Use custom format
# format = """
# [в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
# [в”Ӯ](bold green)$directory$rust$package
# [в””в”Җ>](bold green) """

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

